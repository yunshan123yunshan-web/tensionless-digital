<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Hero Test</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background: #000; }
.pin-wrap { position: relative; height: 600vh; }
.pin-hero { position: sticky; top: 0; height: 100vh; width: 100%; overflow: hidden; }
canvas { position: absolute; inset: 0; width: 100%; height: 100%; }
.after { height: 100vh; background: #090909; display:flex; align-items:center; justify-content:center; color:#fff; font-size:2rem; }
</style>
</head>
<body>
<div class="pin-wrap">
  <div class="pin-hero">
    <canvas id="c"></canvas>
  </div>
</div>
<div class="after">Rest of page continues here</div>
<script>
// Quick scaffold test
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;
ctx.fillStyle = '#fff';
ctx.font = '48px serif';
ctx.fillText('SCROLL TEST', 100, 100);

window.addEventListener('scroll', () => {
  const wrap = document.querySelector('.pin-wrap');
  const total = wrap.offsetHeight - window.innerHeight;
  const progress = window.scrollY / total;
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle = '#fff';
  ctx.font = '48px serif';
  ctx.fillText('Progress: ' + Math.round(progress * 100) + '%', 100, 100);
});
</script>
</body>
</html>
